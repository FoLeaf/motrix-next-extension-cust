name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - uses: ./.github/actions/quality-gate
        with:
          build_chromium: 'true'
          build_firefox: 'true'
