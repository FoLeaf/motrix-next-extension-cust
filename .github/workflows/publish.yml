name: Publish to Stores

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.1.2) or 'latest' for latest production release"
        type: string
        default: latest

permissions:
  actions: write
  contents: read

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Resolve target production release
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_INPUT: ${{ inputs.version }}
        run: npx tsx scripts/actions/resolve-release.ts

  quality-gate:
    name: Quality Gate
    needs: resolve-version
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          path: workflow
          ref: main

      - uses: actions/checkout@v6
        with:
          path: source
          ref: ${{ needs.resolve-version.outputs.tag }}

      - uses: ./workflow/.github/actions/setup-node-pnpm
        with:
          working-directory: source

      - uses: ./workflow/.github/actions/quality-gate
        with:
          working-directory: source

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: [resolve-version, quality-gate]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      outcome: ${{ steps.publish.outputs.outcome }}

    steps:
      - uses: actions/checkout@v6
        with:
          path: workflow
          ref: main

      - uses: actions/checkout@v6
        with:
          path: source
          ref: ${{ needs.resolve-version.outputs.tag }}

      - uses: ./workflow/.github/actions/setup-node-pnpm
        with:
          working-directory: source

      - name: Build and package (Chromium)
        working-directory: source
        run: pnpm zip

      - name: Upload and publish to Chrome Web Store
        id: publish
        working-directory: source
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: npx tsx ../workflow/scripts/actions/publish-chrome.ts

  publish-firefox:
    name: Publish to Firefox AMO
    needs: [resolve-version, quality-gate]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      outcome: ${{ steps.publish.outputs.outcome }}

    steps:
      - uses: actions/checkout@v6
        with:
          path: workflow
          ref: main

      - uses: actions/checkout@v6
        with:
          path: source
          ref: ${{ needs.resolve-version.outputs.tag }}

      - uses: ./workflow/.github/actions/setup-node-pnpm
        with:
          working-directory: source

      - name: Build (Firefox)
        working-directory: source
        run: pnpm build:firefox

      - name: Package source code for AMO review
        working-directory: source
        run: git archive --format=zip --output=source-code.zip HEAD

      - name: Sign and submit to AMO
        id: publish
        working-directory: source
        env:
          FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
        run: npx tsx ../workflow/scripts/actions/publish-firefox.ts

  publish-edge:
    name: Publish to Edge Add-ons
    needs: [resolve-version, quality-gate]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      outcome: ${{ steps.publish.outputs.outcome }}

    steps:
      - uses: actions/checkout@v6
        with:
          path: workflow
          ref: main

      - uses: actions/checkout@v6
        with:
          path: source
          ref: ${{ needs.resolve-version.outputs.tag }}

      - uses: ./workflow/.github/actions/setup-node-pnpm
        with:
          working-directory: source

      - name: Build and package (Chromium)
        working-directory: source
        run: pnpm zip

      - name: Upload and publish to Edge Add-ons
        id: publish
        working-directory: source
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO_VARIABLES_TOKEN: ${{ secrets.REPO_VARIABLES_TOKEN }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: npx tsx ../workflow/scripts/actions/publish-edge.ts

  publish-summary:
    name: Publish Summary
    needs: [resolve-version, quality-gate, publish-chrome, publish-firefox, publish-edge]
    runs-on: ubuntu-24.04
    if: always()

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Generate publish summary
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
          QG_RESULT: ${{ needs.quality-gate.result }}
          CHROME_RESULT: ${{ needs.publish-chrome.result }}
          CHROME_OUTCOME: ${{ needs.publish-chrome.outputs.outcome }}
          FIREFOX_RESULT: ${{ needs.publish-firefox.result }}
          FIREFOX_OUTCOME: ${{ needs.publish-firefox.outputs.outcome }}
          EDGE_RESULT: ${{ needs.publish-edge.result }}
          EDGE_OUTCOME: ${{ needs.publish-edge.outputs.outcome }}
        run: npx tsx scripts/actions/publish-summary.ts
