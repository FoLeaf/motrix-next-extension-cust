name: Store Release Status

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Production release tag/version to compare, or latest'
        type: string
        default: latest

permissions:
  contents: read

jobs:
  status:
    name: Store Release Status
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Resolve production release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_INPUT: ${{ inputs.release }}
        run: npx tsx scripts/actions/resolve-release.ts

      - name: Generate store status report
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          FIREFOX_ADDON_SLUG: ${{ vars.FIREFOX_ADDON_SLUG }}
          FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
          EDGE_EXTENSION_ID: ${{ vars.EDGE_EXTENSION_ID }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_LAST_OPERATION_ID: ${{ vars.EDGE_LAST_OPERATION_ID }}
          EDGE_LAST_OPERATION_VERSION: ${{ vars.EDGE_LAST_OPERATION_VERSION }}
          EDGE_LAST_OPERATION_RUN_ID: ${{ vars.EDGE_LAST_OPERATION_RUN_ID }}
          EDGE_LAST_OPERATION_SUBMITTED_AT: ${{ vars.EDGE_LAST_OPERATION_SUBMITTED_AT }}
        run: npx tsx scripts/actions/store-status.ts
