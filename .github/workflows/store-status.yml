name: Store Release Status

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Production release tag/version to compare, or latest'
        type: string
        default: latest
      edgeOperationId:
        description: 'Optional Edge publish operation id for a known pending submission'
        type: string
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  status:
    name: Store Release Status
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Resolve production release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_INPUT: ${{ inputs.release }}
        run: |
          set -euo pipefail

          INPUT="${RELEASE_INPUT:-latest}"
          if [ "$INPUT" = "latest" ]; then
            TAG=$(gh release list --exclude-pre-releases --limit 1 --json tagName -q '.[0].tagName')
            if [ -z "$TAG" ]; then
              echo "::error::No production GitHub Release found"
              exit 1
            fi
          else
            TAG="$INPUT"
            case "$TAG" in
              v*) ;;
              *) TAG="v$TAG" ;;
            esac
          fi

          RELEASE_JSON=$(gh release view "$TAG" --json isPrerelease,tagName)
          IS_PRERELEASE=$(echo "$RELEASE_JSON" | jq -r '.isPrerelease')
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "::error::$TAG is a prerelease. Store status only compares production releases."
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "::error::$TAG is not a production SemVer tag"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate store status report
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          FIREFOX_ADDON_SLUG: motrix-next-extension
          FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
          EDGE_EXTENSION_ID: loojjolhejmakcdlbidigoniobfanjlb
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_OPERATION_ID: ${{ inputs.edgeOperationId }}
        run: |
          node <<'NODE'
          const crypto = require('node:crypto');
          const zlib = require('node:zlib');

          const env = process.env;

          const cfg = {
            releaseTag: required('RELEASE_TAG'),
            releaseVersion: required('RELEASE_VERSION'),
            chrome: {
              extensionId: env.CHROME_EXTENSION_ID || '',
              publisherId: env.CHROME_PUBLISHER_ID || '',
              clientId: env.CHROME_CLIENT_ID || '',
              clientSecret: env.CHROME_CLIENT_SECRET || '',
              refreshToken: env.CHROME_REFRESH_TOKEN || '',
            },
            firefox: {
              slug: env.FIREFOX_ADDON_SLUG || 'motrix-next-extension',
              apiKey: env.FIREFOX_API_KEY || '',
              apiSecret: env.FIREFOX_API_SECRET || '',
            },
            edge: {
              extensionId: env.EDGE_EXTENSION_ID || '',
              productId: env.EDGE_PRODUCT_ID || '',
              clientId: env.EDGE_CLIENT_ID || '',
              apiKey: env.EDGE_API_KEY || '',
              operationId: env.EDGE_OPERATION_ID || '',
            },
          };

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });

          async function main() {
            const checkedAt = new Date().toISOString();
            const stores = await Promise.all([
              withStoreError('Chrome Web Store', () => checkChrome(cfg.chrome)),
              withStoreError('Firefox AMO', () => checkFirefox(cfg.firefox)),
              withStoreError('Edge Add-ons', () => checkEdge(cfg.edge)),
            ]);

            const report = renderReport({
              releaseTag: cfg.releaseTag,
              releaseVersion: cfg.releaseVersion,
              checkedAt,
              stores,
            });

            await require('node:fs/promises').appendFile(env.GITHUB_STEP_SUMMARY, report);
            console.log(report);
          }

          function required(name) {
            const value = env[name];
            if (!value) throw new Error(`${name} is required`);
            return value;
          }

          async function withStoreError(name, fn) {
            try {
              return await fn();
            } catch (error) {
              return {
                store: name,
                liveVersion: 'Unavailable',
                pendingVersion: 'Unavailable',
                reviewState: 'Unavailable',
                canPublishNow: 'Unknown',
                rawStatus: error instanceof Error ? error.message : String(error),
                notes: 'Status query failed.',
              };
            }
          }

          async function checkChrome(chrome) {
            const publicVersion = await getChromePublicVersion(chrome.extensionId);
            if (!chrome.publisherId || !chrome.clientId || !chrome.clientSecret || !chrome.refreshToken) {
              return {
                store: 'Chrome Web Store',
                liveVersion: publicVersion || 'Unavailable',
                pendingVersion: 'Not checked',
                reviewState: 'Not checked',
                canPublishNow: 'Unknown',
                rawStatus: 'missing CHROME_PUBLISHER_ID or OAuth secrets',
                notes: 'Public version was checked. Review status requires Chrome Web Store API v2 credentials.',
              };
            }

            const token = await getGoogleAccessToken(chrome);
            const name = `publishers/${chrome.publisherId}/items/${chrome.extensionId}`;
            const url = `https://chromewebstore.googleapis.com/v2/${name}:fetchStatus`;
            const status = await fetchJson(url, {
              headers: { Authorization: `Bearer ${token}` },
            });

            const published = getChromeRevision(status.publishedItemRevisionStatus);
            const submitted = getChromeRevision(status.submittedItemRevisionStatus);
            const liveVersion = published.version || publicVersion || 'Unavailable';
            const pendingVersion = submitted.version && submitted.version !== liveVersion ? submitted.version : '-';
            const reviewState = mapChromeState(submitted.state || published.state);
            const canPublishNow = submitted.version && submitted.state !== 'PUBLISHED' ? 'No' : 'Yes';

            return {
              store: 'Chrome Web Store',
              liveVersion,
              pendingVersion,
              reviewState,
              canPublishNow,
              rawStatus: [
                `published=${published.state || 'unset'}`,
                `submitted=${submitted.state || 'unset'}`,
                status.warned ? 'warned=true' : '',
                status.takenDown ? 'takenDown=true' : '',
              ].filter(Boolean).join(', '),
              notes: status.takenDown
                ? 'Item is taken down.'
                : status.warned
                  ? 'Item has a policy warning.'
                  : 'Chrome API status fetched.',
            };
          }

          async function getGoogleAccessToken(chrome) {
            const body = new URLSearchParams({
              client_id: chrome.clientId,
              client_secret: chrome.clientSecret,
              refresh_token: chrome.refreshToken,
              grant_type: 'refresh_token',
            });
            const data = await fetchJson('https://oauth2.googleapis.com/token', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body,
            });
            if (!data.access_token) throw new Error('Chrome OAuth token response did not include access_token');
            return data.access_token;
          }

          function getChromeRevision(revision) {
            const channels = Array.isArray(revision?.distributionChannels)
              ? revision.distributionChannels
              : [];
            const fullDeploy = channels.find((channel) => channel.deployPercentage === 100);
            const channel = fullDeploy || channels[0] || {};
            return {
              state: revision?.state || '',
              version: channel.crxVersion || '',
            };
          }

          async function getChromePublicVersion(extensionId) {
            if (!extensionId) return '';
            const url = `https://clients2.google.com/service/update2/crx?response=updatecheck&prodversion=146.0.0.0&acceptformat=crx3&x=id%3D${encodeURIComponent(extensionId)}%26uc`;
            const text = await fetchText(url);
            const match = text.match(/<updatecheck\b[^>]*\bversion="([^"]+)"/);
            return match?.[1] || '';
          }

          function mapChromeState(state) {
            switch (state) {
              case 'PENDING_REVIEW':
                return 'In review';
              case 'STAGED':
                return 'Approved, staged';
              case 'PUBLISHED':
                return 'Published';
              case 'PUBLISHED_TO_TESTERS':
                return 'Published to testers';
              case 'REJECTED':
                return 'Rejected';
              case 'CANCELLED':
                return 'Cancelled';
              default:
                return state || 'No active submission';
            }
          }

          async function checkFirefox(firefox) {
            const publicVersions = await getFirefoxVersions(firefox.slug, '');
            const publicLive = firstPublicFirefoxVersion(publicVersions);
            const authHeader = firefox.apiKey && firefox.apiSecret ? createAmoJwt(firefox) : '';
            const versions = authHeader
              ? await getFirefoxVersions(firefox.slug, authHeader, 'all_without_unlisted')
              : publicVersions;

            const latest = versions[0];
            const pending = versions.find((version) => firefoxStatus(version) !== 'public');
            const liveVersion = publicLive?.version || 'Unavailable';
            const pendingVersion = pending?.version && pending.version !== liveVersion ? pending.version : '-';
            const activeStatus = pending ? firefoxStatus(pending) : firefoxStatus(latest);

            return {
              store: 'Firefox AMO',
              liveVersion,
              pendingVersion,
              reviewState: mapFirefoxState(activeStatus),
              canPublishNow: pending ? 'No' : 'Yes',
              rawStatus: activeStatus ? `file.status=${activeStatus}` : 'no versions returned',
              notes: authHeader
                ? 'AMO developer version list fetched.'
                : 'Public version was checked. Review status requires AMO API credentials.',
            };
          }

          async function getFirefoxVersions(slug, authHeader, filter = '') {
            const params = new URLSearchParams({ page_size: '10' });
            if (filter) params.set('filter', filter);
            const url = `https://addons.mozilla.org/api/v5/addons/addon/${encodeURIComponent(slug)}/versions/?${params}`;
            const headers = authHeader ? { Authorization: authHeader } : {};
            const data = await fetchJson(url, { headers });
            return Array.isArray(data.results) ? data.results : [];
          }

          function createAmoJwt(firefox) {
            const now = Math.floor(Date.now() / 1000);
            const header = { alg: 'HS256', typ: 'JWT' };
            const payload = {
              iss: firefox.apiKey,
              jti: crypto.randomUUID(),
              iat: now,
              exp: now + 60,
            };
            const unsigned = `${base64UrlJson(header)}.${base64UrlJson(payload)}`;
            const signature = crypto.createHmac('sha256', firefox.apiSecret).update(unsigned).digest('base64url');
            return `JWT ${unsigned}.${signature}`;
          }

          function firstPublicFirefoxVersion(versions) {
            return versions.find((version) => firefoxStatus(version) === 'public');
          }

          function firefoxStatus(version) {
            return version?.file?.status || '';
          }

          function mapFirefoxState(status) {
            switch (status) {
              case 'public':
                return 'Published';
              case 'unreviewed':
                return 'Awaiting review';
              case 'disabled':
                return 'Disabled or rejected';
              case 'awaiting-review':
                return 'Awaiting review';
              default:
                return status || 'No active submission';
            }
          }

          async function checkEdge(edge) {
            const liveVersion = await getEdgePublicVersion(edge.extensionId);
            if (!edge.operationId) {
              return {
                store: 'Edge Add-ons',
                liveVersion: liveVersion || 'Unavailable',
                pendingVersion: 'Not tracked',
                reviewState: 'Not tracked',
                canPublishNow: 'Unknown',
                rawStatus: 'no Edge operation id provided',
                notes: 'Live package was checked. Pending review state requires an Edge publish operation id.',
              };
            }

            if (!edge.productId || !edge.clientId || !edge.apiKey) {
              return {
                store: 'Edge Add-ons',
                liveVersion: liveVersion || 'Unavailable',
                pendingVersion: 'Not tracked',
                reviewState: 'Not checked',
                canPublishNow: 'Unknown',
                rawStatus: 'missing Edge API credentials',
                notes: 'Live package was checked. Operation lookup requires Edge API credentials.',
              };
            }

            const url = `https://api.addons.microsoftedge.microsoft.com/v1/products/${edge.productId}/submissions/operations/${edge.operationId}`;
            const operation = await fetchJson(url, {
              headers: {
                Authorization: `ApiKey ${edge.apiKey}`,
                'X-ClientID': edge.clientId,
              },
            });
            const status = operation.status || operation.Status || '';

            return {
              store: 'Edge Add-ons',
              liveVersion: liveVersion || 'Unavailable',
              pendingVersion: 'Tracked operation',
              reviewState: mapEdgeState(status),
              canPublishNow: status === 'InProgress' ? 'No' : 'Unknown',
              rawStatus: `operation.status=${status || 'unset'}`,
              notes: `Operation ${edge.operationId} checked.`,
            };
          }

          async function getEdgePublicVersion(extensionId) {
            if (!extensionId) return '';
            const url = `https://edge.microsoft.com/extensionwebstorebase/v1/crx?response=redirect&prodversion=146.0.0.0&acceptformat=crx3&x=id%3D${encodeURIComponent(extensionId)}%26installsource%3Dondemand%26uc`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Edge public package request failed: HTTP ${response.status}`);
            const buffer = Buffer.from(await response.arrayBuffer());
            const manifest = readManifestFromCrx(buffer);
            return manifest.version || '';
          }

          function mapEdgeState(status) {
            switch (status) {
              case 'InProgress':
                return 'In progress';
              case 'Succeeded':
                return 'Submitted or completed';
              case 'Failed':
                return 'Failed';
              default:
                return status || 'Not tracked';
            }
          }

          function readManifestFromCrx(buffer) {
            const zipOffset = getZipOffset(buffer);
            const eocd = findEocd(buffer);
            const centralSize = buffer.readUInt32LE(eocd + 12);
            const centralOffset = zipOffset + buffer.readUInt32LE(eocd + 16);
            let cursor = centralOffset;
            const end = centralOffset + centralSize;

            while (cursor < end) {
              if (buffer.readUInt32LE(cursor) !== 0x02014b50) break;
              const method = buffer.readUInt16LE(cursor + 10);
              const compressedSize = buffer.readUInt32LE(cursor + 20);
              const nameLength = buffer.readUInt16LE(cursor + 28);
              const extraLength = buffer.readUInt16LE(cursor + 30);
              const commentLength = buffer.readUInt16LE(cursor + 32);
              const localOffset = zipOffset + buffer.readUInt32LE(cursor + 42);
              const name = buffer.subarray(cursor + 46, cursor + 46 + nameLength).toString('utf8');

              if (name === 'manifest.json') {
                const localNameLength = buffer.readUInt16LE(localOffset + 26);
                const localExtraLength = buffer.readUInt16LE(localOffset + 28);
                const dataStart = localOffset + 30 + localNameLength + localExtraLength;
                const data = buffer.subarray(dataStart, dataStart + compressedSize);
                const json = method === 8 ? zlib.inflateRawSync(data).toString('utf8') : data.toString('utf8');
                return JSON.parse(json);
              }

              cursor += 46 + nameLength + extraLength + commentLength;
            }

            throw new Error('manifest.json not found in Edge package');
          }

          function getZipOffset(buffer) {
            if (buffer.subarray(0, 4).toString('ascii') !== 'Cr24') return 0;
            const version = buffer.readUInt32LE(4);
            if (version === 3) return 12 + buffer.readUInt32LE(8);
            if (version === 2) return 16 + buffer.readUInt32LE(8) + buffer.readUInt32LE(12);
            throw new Error(`Unsupported CRX version: ${version}`);
          }

          function findEocd(buffer) {
            for (let i = buffer.length - 22; i >= 0; i -= 1) {
              if (buffer.readUInt32LE(i) === 0x06054b50) return i;
            }
            throw new Error('ZIP end of central directory not found');
          }

          async function fetchJson(url, init = {}) {
            const response = await fetch(url, init);
            const text = await response.text();
            if (!response.ok) {
              throw new Error(`${url} failed: HTTP ${response.status} ${text.slice(0, 240)}`);
            }
            return text ? JSON.parse(text) : {};
          }

          async function fetchText(url, init = {}) {
            const response = await fetch(url, init);
            const text = await response.text();
            if (!response.ok) {
              throw new Error(`${url} failed: HTTP ${response.status} ${text.slice(0, 240)}`);
            }
            return text;
          }

          function base64UrlJson(value) {
            return Buffer.from(JSON.stringify(value)).toString('base64url');
          }

          function renderReport({ releaseTag, releaseVersion, checkedAt, stores }) {
            const decision = buildDecision(releaseVersion, stores);
            const lines = [
              '## Store Release Status',
              '',
              `Release: ${releaseTag}`,
              `Checked at: ${checkedAt}`,
              '',
              '| Store | Live version | Pending version | Review state | Can publish now |',
              '|---|---:|---:|---|---|',
              ...stores.map((store) =>
                `| ${store.store} | ${md(store.liveVersion)} | ${md(store.pendingVersion)} | ${md(store.reviewState)} | ${md(store.canPublishNow)} |`,
              ),
              '',
              '### Details',
              '',
              '| Store | Raw status | Notes |',
              '|---|---|---|',
              ...stores.map((store) => `| ${store.store} | \`${escapeCode(store.rawStatus)}\` | ${md(store.notes)} |`),
              '',
              '### Decision',
              '',
              decision,
              '',
            ];
            return `${lines.join('\n')}\n`;
          }

          function buildDecision(releaseVersion, stores) {
            const blockers = stores.filter((store) => store.canPublishNow === 'No');
            const behind = stores.filter(
              (store) => isVersion(store.liveVersion) && store.liveVersion !== releaseVersion,
            );
            const unknown = stores.filter((store) => store.canPublishNow === 'Unknown');

            if (blockers.length > 0) {
              return `Do not submit another release yet. ${blockers.map((store) => store.store).join(', ')} already has an active submission or review blocker.`;
            }

            if (behind.length > 0 || unknown.length > 0) {
              return [
                'Review before publishing.',
                `Stores behind the target release: ${storeNames(behind) || 'none'}.`,
                `Stores with incomplete publishability data: ${storeNames(unknown) || 'none'}.`,
              ].join(' ');
            }

            return 'All checked stores match the target release and no active review blocker was detected.';
          }

          function storeNames(stores) {
            return stores.map((store) => store.store).join(', ');
          }

          function isVersion(value) {
            return /^\d+\.\d+\.\d+(?:[-.][0-9A-Za-z]+)*$/.test(value);
          }

          function md(value) {
            return String(value || '-').replaceAll('|', '\\|').replaceAll('\n', ' ');
          }

          function escapeCode(value) {
            return String(value || '-').replaceAll('`', '\\`').replaceAll('\n', ' ');
          }
          NODE
